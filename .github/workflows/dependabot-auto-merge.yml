name: Dependabot Auto-Merge

# Trigger whenever Dependabot opens or updates a PR, or when a PR is labeled.
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only run for Dependabot PRs
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Determine whether this update qualifies for auto-merge.
      # Patch and minor version bumps (including security fixes) are safe to
      # merge automatically. Major bumps may contain breaking changes and are
      # left for manual review.
      - name: Check if update qualifies for auto-merge
        id: check-update
        run: |
          update_type="${{ steps.dependabot-metadata.outputs.update-type }}"
          if [[ "$update_type" == "version-update:semver-patch" || "$update_type" == "version-update:semver-minor" ]]; then
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          else
            echo "eligible=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Approve PR
        if: steps.check-update.outputs.eligible == 'true'
        run: gh pr review "$PR_URL" --approve --body "Automatically approved by dependabot-auto-merge workflow."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Enable auto-merge so the PR merges as soon as required checks pass.
      - name: Enable auto-merge
        if: steps.check-update.outputs.eligible == 'true'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
